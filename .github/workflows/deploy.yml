name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# allow this workflow to publish to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# only one deploy at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      # use `npm install` rather than `npm ci`: the lockfile is generated on
      # Windows, which prunes the Linux-only wasm/native optional deps that the
      # ubuntu runner resolves (e.g. @emnapi/core via @napi-rs/wasm-runtime).
      # `npm install` reconciles those at build time instead of hard-failing.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
